basePath: /
definitions:
  github_com_HanzChrisrome_org-man-app_internal_config.LoginRequest:
    properties:
      identifier:
        description: Email or StudentID
        type: string
      password:
        type: string
    type: object
  github_com_HanzChrisrome_org-man-app_internal_config.Member:
    properties:
      contact_number:
        type: string
      course:
        type: string
      created_at:
        type: string
      email:
        type: string
      last_updated:
        type: string
      member_id:
        type: string
      name:
        type: string
      registration_status:
        type: string
      student_id:
        type: string
    type: object
  github_com_HanzChrisrome_org-man-app_internal_config.MemberWithPayment:
    properties:
      approver_name:
        type: string
      contact_number:
        type: string
      course:
        type: string
      created_at:
        type: string
      email:
        type: string
      last_updated:
        type: string
      latest_approval_date:
        type: string
      latest_payment_id:
        type: integer
      latest_payment_status:
        type: string
      latest_submission_date:
        type: string
      member_id:
        type: string
      name:
        type: string
      registration_status:
        type: string
      student_id:
        type: string
    type: object
  github_com_HanzChrisrome_org-man-app_internal_config.RegisterRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
      student_id:
        type: string
    type: object
  github_com_HanzChrisrome_org-man-app_internal_config.UpdateMemberRequest:
    properties:
      contact_number:
        type: string
      course:
        type: string
      email:
        type: string
      name:
        type: string
      registration_status:
        type: string
      student_id:
        type: string
    type: object
  internal_handlers.LogoutRequest:
    properties:
      session_id:
        type: string
    type: object
  internal_handlers.RefreshRequest:
    properties:
      refresh_token:
        type: string
      session_id:
        type: string
    type: object
info:
  contact: {}
  description: API documentation for org-mem-gdg backend
  title: Org Mem GDG API
  version: "1.0"
paths:
  /api/login:
    post:
      consumes:
      - application/json
      description: Authenticate a member and return a token pair.
      parameters:
      - description: Login payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_HanzChrisrome_org-man-app_internal_config.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login
      tags:
      - Auth
  /api/logout:
    post:
      consumes:
      - application/json
      description: Revoke an active session.
      parameters:
      - description: Logout payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.LogoutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Logout
      tags:
      - Auth
  /api/members:
    get:
      parameters:
      - description: Search name/student_id
        in: query
        name: q
        type: string
      - description: Filter by registration status
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_HanzChrisrome_org-man-app_internal_config.MemberWithPayment'
            type: array
      security:
      - BearerAuth: []
      summary: List members with payment summary (Executive only)
      tags:
      - Member
    post:
      consumes:
      - application/json
      parameters:
      - description: Create payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_HanzChrisrome_org-man-app_internal_config.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_HanzChrisrome_org-man-app_internal_config.Member'
      security:
      - BearerAuth: []
      summary: Create member (Executive only)
      tags:
      - Member
  /api/members/{id}:
    delete:
      parameters:
      - description: Member ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Soft delete member (Executive only)
      tags:
      - Member
    get:
      parameters:
      - description: Member ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_HanzChrisrome_org-man-app_internal_config.Member'
      security:
      - BearerAuth: []
      summary: Get member detail (Executive only)
      tags:
      - Member
    put:
      consumes:
      - application/json
      parameters:
      - description: Member ID
        in: path
        name: id
        required: true
        type: string
      - description: Update payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_HanzChrisrome_org-man-app_internal_config.UpdateMemberRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_HanzChrisrome_org-man-app_internal_config.Member'
      security:
      - BearerAuth: []
      summary: Update member (Executive only)
      tags:
      - Member
  /api/refresh:
    post:
      consumes:
      - application/json
      description: Refresh an access token using session_id and refresh_token.
      parameters:
      - description: Refresh payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Refresh access token
      tags:
      - Auth
  /api/register:
    post:
      consumes:
      - application/json
      description: Create a new member account.
      parameters:
      - description: Register payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_HanzChrisrome_org-man-app_internal_config.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register member
      tags:
      - Auth
  /health:
    get:
      description: Returns API liveness status.
      produces:
      - text/plain
      responses:
        "200":
          description: OK
          schema:
            type: string
      summary: Health check
      tags:
      - Health
securityDefinitions:
  BearerAuth:
    description: Type 'Bearer ' followed by a space and your JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
