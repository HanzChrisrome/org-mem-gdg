basePath: /
definitions:
  internal_handlers.CreateExecutiveRequestDoc:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
      role_id:
        format: uuid
        type: string
      student_id:
        type: string
    required:
    - email
    - name
    - password
    - student_id
    type: object
  internal_handlers.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  internal_handlers.ExecutiveResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      executive_id:
        type: string
      last_updated:
        type: string
      name:
        type: string
      role_id:
        format: uuid
        type: string
      student_id:
        type: string
    type: object
  internal_handlers.LoginRequestDoc:
    properties:
      identifier:
        description: Email or StudentID
        type: string
      password:
        type: string
    type: object
  internal_handlers.LoginResponse:
    properties:
      owner_type:
        type: string
      token:
        $ref: '#/definitions/internal_handlers.TokenPairResponse'
      user_id:
        type: string
    type: object
  internal_handlers.MemberResponse:
    properties:
      contact_number:
        type: string
      course:
        type: string
      created_at:
        type: string
      email:
        type: string
      last_updated:
        type: string
      member_id:
        type: string
      name:
        type: string
      registration_status:
        type: string
      student_id:
        type: string
    type: object
  internal_handlers.MemberWithPaymentResponse:
    properties:
      approver_name:
        type: string
      contact_number:
        type: string
      course:
        type: string
      created_at:
        type: string
      email:
        type: string
      last_updated:
        type: string
      latest_approval_date:
        type: string
      latest_payment_id:
        format: uuid
        type: string
      latest_payment_status:
        type: string
      latest_submission_date:
        type: string
      member_id:
        type: string
      name:
        type: string
      registration_status:
        type: string
      student_id:
        type: string
    type: object
  internal_handlers.MessageResponse:
    properties:
      message:
        type: string
    type: object
  internal_handlers.RefreshRequest:
    properties:
      refresh_token:
        type: string
      refresh_token_id:
        type: string
    type: object
  internal_handlers.RefreshResponse:
    properties:
      token:
        $ref: '#/definitions/internal_handlers.TokenPairResponse'
    type: object
  internal_handlers.RegisterRequestDoc:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
      source_dashboard:
        description: '"members" or "executives"'
        type: string
      student_id:
        type: string
    required:
    - source_dashboard
    type: object
  internal_handlers.RegisterResponse:
    properties:
      owner_type:
        type: string
      user: {}
    type: object
  internal_handlers.TokenPairResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
      token_type:
        type: string
    type: object
  internal_handlers.UpdateExecutiveRequestDoc:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
      role_id:
        format: uuid
        type: string
      student_id:
        type: string
    type: object
  internal_handlers.UpdateMemberRequestDoc:
    properties:
      contact_number:
        type: string
      course:
        type: string
      email:
        type: string
      name:
        type: string
      registration_status:
        type: string
      student_id:
        type: string
    type: object
info:
  contact: {}
  description: API documentation for org-mem-gdg backend
  title: Org Mem GDG API
  version: "1.0"
paths:
  /api/executives:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_handlers.ExecutiveResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List executives (Executive only)
      tags:
      - Executive
    post:
      consumes:
      - application/json
      parameters:
      - description: Create payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.CreateExecutiveRequestDoc'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handlers.ExecutiveResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create executive (Executive only)
      tags:
      - Executive
  /api/executives/{id}:
    delete:
      parameters:
      - description: Executive ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.MessageResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete executive (Executive only)
      tags:
      - Executive
    get:
      parameters:
      - description: Executive ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.ExecutiveResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get executive detail (Executive only)
      tags:
      - Executive
    put:
      consumes:
      - application/json
      parameters:
      - description: Executive ID
        in: path
        name: id
        required: true
        type: string
      - description: Update payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.UpdateExecutiveRequestDoc'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.ExecutiveResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update executive (Executive only)
      tags:
      - Executive
  /api/login:
    post:
      consumes:
      - application/json
      description: Authenticate an executive and return a token pair. Member login
        is not supported.
      parameters:
      - description: Login payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.LoginRequestDoc'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      summary: Login
      tags:
      - Auth
  /api/logout:
    post:
      consumes:
      - application/json
      description: Revoke an active session.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.MessageResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Logout
      tags:
      - Auth
  /api/members:
    get:
      description: Provides a searchable list of members including their basic info
        and latest payment status.
      parameters:
      - description: Search name/student_id
        in: query
        name: q
        type: string
      - description: Filter by registration status (e.g. pending, active, inactive)
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_handlers.MemberWithPaymentResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List members with payment summary (Executive only)
      tags:
      - Member
    post:
      consumes:
      - application/json
      parameters:
      - description: Create payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.RegisterRequestDoc'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handlers.MemberResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create member (Executive only)
      tags:
      - Member
  /api/members/{id}:
    delete:
      parameters:
      - description: Member ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.MessageResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Soft delete member (Executive only)
      tags:
      - Member
    get:
      parameters:
      - description: Member ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.MemberResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get member detail (Executive only)
      tags:
      - Member
    put:
      consumes:
      - application/json
      parameters:
      - description: Member ID
        in: path
        name: id
        required: true
        type: string
      - description: Update payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.UpdateMemberRequestDoc'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.MemberResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update member (Executive only)
      tags:
      - Member
  /api/refresh:
    post:
      consumes:
      - application/json
      description: Refresh an access token using refresh_token_id and refresh_token.
      parameters:
      - description: Refresh payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.RefreshResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      summary: Refresh access token
      tags:
      - Auth
  /api/register:
    post:
      consumes:
      - application/json
      description: Create a new member or executive account based on the source dashboard.
      parameters:
      - description: Register payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.RegisterRequestDoc'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handlers.RegisterResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      summary: Register
      tags:
      - Auth
  /api/sessions/{id}/revoke:
    post:
      consumes:
      - application/json
      description: Revoke a session via workspace or admin action.
      parameters:
      - description: Refresh Token ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      summary: Revoke session
      tags:
      - Auth
  /health:
    get:
      description: Returns API liveness status.
      produces:
      - text/plain
      responses:
        "200":
          description: OK
          schema:
            type: string
      summary: Health check
      tags:
      - Health
securityDefinitions:
  BearerAuth:
    description: Type 'Bearer ' followed by a space and your JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
